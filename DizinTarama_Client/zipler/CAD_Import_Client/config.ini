[SERVER]
url = http://192.168.1.206:3000
api_base = /api/cad-import
socket_namespace = /cad-import
timeout = 30

[CLIENT]
client_name = CAD Import Client
auto_reconnect = true
heartbeat_interval = 30

[SOLIDWORKS]
concurrent_models = 1
retry_attempts = 3
timeout_seconds = 120
close_after_processing = true

[FILES]
supported_extensions = .sldprt,.sldpart,.sldasm
thumbnail_quality = high
temp_directory = ./temp
max_file_size_mb = 100

[LOGGING]
level = INFO
file = cad_import.log
max_size_mb = 10
backup_count = 5

[UI]
window_width = 1200
window_height = 800
auto_refresh_interval = 5