[SERVER]
# ÜRTM Takip Backend Server Ayarları
url = http://192.168.1.206:3000
api_base = /api/cad-import
timeout = 30

# SSL/TLS Ayarları (opsiyonel)
verify_ssl = true
cert_path = 

[CLIENT]
# Client Kimlik Bilgileri
client_name = STEP BOM Analyzer
client_id_prefix = step_analyzer
auto_register = true

[STEP_PROCESSING]
# STEP Dosya İşleme Ayarları
supported_extensions = .step,.stp,.STEP,.STP
max_file_size_mb = 500
timeout_seconds = 300

[RENDERING]
# Part Rendering Ayarları
screenshot_resolution = 1920x1080
screenshot_format = png
viewpoints = front,back,left,right,top,iso

[FREECAD_PROCESSING]
# FreeCAD STEP İşleme Ayarları (V2 - FreeCAD Only)
supported_extensions = .step,.stp,.STEP,.STP
max_file_size_mb = 500
timeout_seconds = 300
max_assembly_depth = 20

# FreeCAD Yolları (Otomatik tespit edilir)
path = C:\Program Files\FreeCAD 1.0\bin\FreeCAD.exe
python_path = C:\Program Files\FreeCAD 1.0\bin\python.exe

# FreeCAD Ayarları
gui_mode = true
screenshot_resolution = 1920x1080
precision = 0.1
batch_size = 10
memory_limit_mb = 4000

[BOM_GENERATION]
# BOM Çıkarma Ayarları V2 (FreeCAD Uyumlu)
include_assemblies = true
include_parts = true
auto_numbering = true
export_images = true
export_formats = json,excel,csv,xml

# Hiyerarşi Ayarları
max_hierarchy_levels = 20
flatten_hierarchy = false
include_instance_count = true

# Part Kategorileri
auto_categorize = true
include_geometry_analysis = true
include_volume_analysis = true

[VISUAL_REPORTING]
# Görsel BOM Raporlama (FreeCAD Only - V2)
render_engine = freecad
screenshot_format = png
screenshot_quality = high
image_resolution = 1920x1080
background_color = white

# FreeCAD Screenshot Ayarları
multi_angle_views = true
viewpoints = front,back,left,right,top,iso
part_isolation = true
assembly_overview = true

# Thumbnail Ayarları
thumbnail_size = 300x300
thumbnail_quality = 85
create_galleries = true

# HTML/PDF Raporlar
generate_html_report = true
generate_pdf_report = true
interactive_view = true

[API_INTEGRATION]
# API Entegrasyon Ayarları V2
batch_size = 50
concurrent_requests = 3
retry_attempts = 3
retry_delay_seconds = 2

# Part & BOM Senkronizasyon
auto_check_existing_parts = true
upload_missing_parts = true
sync_bom_structure = true
include_thumbnails = true
upload_part_images = true

# Job Tracking
enable_job_tracking = true
progress_reporting_interval = 5

[OUTPUT]
# Çıktı Dosya Ayarları
output_directory = ./output
temp_directory = ./temp
keep_temp_files = false

# BOM Export
bom_filename_template = BOM_{assembly_name}_{timestamp}
include_timestamp = true
export_images_separately = true

# Thumbnail Ayarları
thumbnail_size = 300x300
thumbnail_quality = 85
thumbnail_background = transparent

[LOGGING]
# Loglama Ayarları
level = INFO
file = step_bom_analyzer.log
max_size_mb = 50
backup_count = 5
console_output = true

# Debug Modları
debug_step_parsing = false
debug_bom_extraction = false
debug_rendering = false
debug_api_calls = false

[GUI_SETTINGS]
# Kullanıcı Arayüzü Ayarları V2 (7 Phase Workflow)
window_width = 1400
window_height = 900
theme = default
auto_refresh_interval = 5

# Workflow Sekmeler
enable_step_import_tab = true
enable_data_analysis_tab = true
enable_bom_generation_tab = true
enable_bom_visualization_tab = true
enable_part_rendering_tab = true
enable_visual_bom_tab = true
enable_server_sync_tab = true

# Progress Reporting
show_detailed_progress = true
progress_update_interval = 100
enable_workflow_navigation = true